<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satnica takmičenja</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
    }

    .wrap {
        max-width: 900px;
        margin: 50px auto;
        padding: 20px;
    }

    /* HEADER */
    .header {
        text-align: center;
        margin-bottom: 40px;
    }

    .school {
        font-size: 12px;
        letter-spacing: 3px;
        color: #38bdf8;
        text-transform: uppercase;
    }

    h1 {
        margin: 10px 0;
        font-size: 28px;
    }

    .meta {
        font-size: 14px;
        color: #94a3b8;
    }

    /* VEĆI PREDMETI */
    .subjects {
        font-size: 18px;
        font-weight: 600;
        color: #cbd5e1;
        margin-top: 10px;
        line-height: 1.4;
    }

    /* TIMELINE */
    .timeline {
        position: relative;
        margin-top: 40px;
        padding-left: 30px;
        border-left: 2px solid rgba(56,189,248,0.3);
    }

    .event {
        position: relative;
        margin-bottom: 30px;
        padding-left: 20px;
    }

    .dot {
        position: absolute;
        left: -9px;
        top: 5px;
        width: 14px;
        height: 14px;
        background: #38bdf8;
        border-radius: 50%;
        box-shadow: 0 0 12px rgba(56,189,248,0.8);
    }

    .time {
        font-size: 13px;
        color: #38bdf8;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .title {
        font-size: 16px;
        color: #e5e7eb;
    }

    .event:hover .title {
        color: #38bdf8;
        transition: 0.2s;
    }
</style>
</head>

<body>

<div class="wrap">

    <div class="header">
        <div class="school">ЕТШ "Мија Станимировић"</div>

        <h1>Сатница такмичења</h1>

        <div class="meta">Ниш • 8.5.2026</div>

        <div class="subjects">
            Основе електронике 1 и 2<br>
            Електроника<br>
            Енергетска електроника
        </div>
    </div>

    <div class="timeline">

        <div class="event">
            <div class="dot"></div>
            <div class="time">08:00 – 08:15</div>
            <div class="title">Улазак и распоређивање учесника</div>
        </div>

        <div class="event">
            <div class="dot"></div>
            <div class="time">09:00 – 12:00</div>
            <div class="title">Рад на задацима (писмени део)</div>
        </div>

        <div class="event">
            <div class="dot"></div>
            <div class="time">13:00</div>
            <div class="title">Објављивање привремених резултата</div>
        </div>

        <div class="event">
            <div class="dot"></div>
            <div class="time">14:00</div>
            <div class="title">Коначан пласман и резултати</div>
        </div>

    </div>

</div>

</body>
</html>
